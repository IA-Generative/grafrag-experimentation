completion_models:
  default_completion_model:
    model_provider: openai
    model: ${SCW_CHAT_MODEL}
    api_base: ${SCW_CHAT_BASE_URL}
    api_key: ${SCW_API_KEY}
    auth_method: api_key
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: openai
    model: ${SCW_EMBEDDING_MODEL}
    api_base: ${SCW_EMBEDDING_BASE_URL}
    api_key: ${SCW_API_KEY}
    auth_method: api_key
    call_args:
      encoding_format: float
    retry:
      type: exponential_backoff

concurrent_requests: 25
async_mode: threaded

input:
  type: text
  file_pattern: ".*\\.(md|txt)"

chunking:
  type: tokens
  size: 1200
  overlap: 100
  encoding_model: o200k_base

input_storage:
  type: file
  base_dir: input

output_storage:
  type: file
  base_dir: output

reporting:
  type: file
  base_dir: output/reports

cache:
  type: json
  storage:
    type: file
    base_dir: cache

vector_store:
  type: lancedb
  db_uri: output/lancedb
  vector_size: ${OPENAI_EMBEDDING_VECTOR_SIZE}

embed_text:
  embedding_model_id: default_embedding_model
  batch_size: 16
  batch_max_tokens: 8191

extract_graph:
  completion_model_id: default_completion_model
  entity_types: [organization, person, geo, event]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  max_length: 500

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

community_reports:
  completion_model_id: default_completion_model
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: true
  embeddings: false

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model

global_search:
  completion_model_id: default_completion_model

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
