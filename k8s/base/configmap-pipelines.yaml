apiVersion: v1
kind: ConfigMap
metadata:
  name: pipelines-config
  namespace: ${NAMESPACE}
data:
  graphrag_pipeline.py: |
    import json
    from typing import Any
    from urllib import request as urllib_request

    from pydantic import BaseModel, Field


    class Pipeline:
        class Valves(BaseModel):
            bridge_url: str = Field(default="http://bridge:8081")
            default_method: str = Field(default="local")
            timeout_seconds: int = Field(default=90)

        def __init__(self) -> None:
            self.type = "pipe"
            self.id = "graphrag-bridge"
            self.name = "GraphRAG Bridge"
            self.valves = self.Valves()

        async def on_startup(self) -> None:
            return None

        async def on_shutdown(self) -> None:
            return None

        def pipes(self) -> list[dict[str, str]]:
            return [
                {"id": "graphrag-local", "name": "GraphRAG Local"},
                {"id": "graphrag-global", "name": "GraphRAG Global"},
            ]

        def pipe(self, body: dict[str, Any], user: dict[str, Any] | None = None) -> str:
            question = self._extract_question(body)
            if not question:
                return "The pipeline did not receive a user question."

            model_name = str(body.get("model", "graphrag-local")).lower()
            method = "global" if "global" in model_name else self.valves.default_method
            payload = json.dumps({"question": question, "method": method}).encode("utf-8")
            http_request = urllib_request.Request(
                f"{self.valves.bridge_url}/query",
                data=payload,
                headers={"Content-Type": "application/json"},
                method="POST",
            )
            try:
                with urllib_request.urlopen(
                    http_request, timeout=self.valves.timeout_seconds
                ) as response:
                    data = json.loads(response.read().decode("utf-8"))
            except Exception as error:
                return f"GraphRAG bridge request failed: {error}"

            answer = data.get("answer", "No answer returned by the bridge.")
            citations = data.get("citations", [])
            if citations:
                sources = "\n".join(
                    f"- {item.get('path', 'unknown source')}" for item in citations
                )
                return f"{answer}\n\nSources:\n{sources}"
            return answer

        def _extract_question(self, body: dict[str, Any]) -> str:
            messages = body.get("messages") or []
            for message in reversed(messages):
                if message.get("role") != "user":
                    continue
                content = message.get("content", "")
                if isinstance(content, str):
                    return content.strip()
                if isinstance(content, list):
                    text_parts = [
                        item.get("text", "")
                        for item in content
                        if isinstance(item, dict) and item.get("type") == "text"
                    ]
                    merged = "\n".join(part for part in text_parts if part).strip()
                    if merged:
                        return merged
            return ""

