apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bridge
  template:
    metadata:
      labels:
        app: bridge
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: bootstrap-graphrag
          image: ${REGISTRY}/grafrag-bridge:${IMAGE_TAG}
          command:
            - /bin/sh
            - -c
            - mkdir -p /data/graphrag/input /data/graphrag/output /data/graphrag/cache && cp -Rn /bootstrap/graphrag/. /data/graphrag/ || true
          volumeMounts:
            - name: graphrag-data
              mountPath: /data/graphrag
            - name: graphrag-cache
              mountPath: /data/graphrag/cache
        - name: sync-graphrag-cache-from-s3
          image: ${REGISTRY}/grafrag-bridge:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: grafrag-config
            - secretRef:
                name: grafrag-secrets
          command:
            - /bin/sh
            - -c
            - python /app/cache_sync.py pull
          volumeMounts:
            - name: graphrag-cache
              mountPath: /data/graphrag/cache
      containers:
        - name: bridge
          image: ${REGISTRY}/grafrag-bridge:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: grafrag-config
            - secretRef:
                name: grafrag-secrets
          env:
            - name: BRIDGE_HOST
              value: "0.0.0.0"
            - name: BRIDGE_PORT
              value: "8081"
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - python /app/cache_sync.py push || true
          ports:
            - containerPort: 8081
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: graphrag-data
              mountPath: /data/graphrag
            - name: graphrag-cache
              mountPath: /data/graphrag/cache
      volumes:
        - name: graphrag-data
          persistentVolumeClaim:
            claimName: graphrag-data
        - name: graphrag-cache
          emptyDir: {}
