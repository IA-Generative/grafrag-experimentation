apiVersion: v1
kind: ConfigMap
metadata:
  name: grafrag-config
  namespace: ${NAMESPACE}
data:
  SCW_LLM_BASE_URL: "${SCW_LLM_BASE_URL}"
  SCW_LLM_MODEL: "${SCW_LLM_MODEL}"
  OPENAI_EMBEDDING_MODEL: "${OPENAI_EMBEDDING_MODEL}"
  GRAPHRAG_METHOD: "${GRAPHRAG_METHOD}"
  GRAPHRAG_RESPONSE_TYPE: "${GRAPHRAG_RESPONSE_TYPE}"
  GRAPHRAG_ROOT: /data/graphrag
  GRAPHRAG_INPUT_DIR: /data/graphrag/input
  GRAPHRAG_OUTPUT_DIR: /data/graphrag/output
  GRAPHRAG_CACHE_DIR: /data/graphrag/cache
  GRAPHRAG_CACHE_S3_ENABLED: "${GRAPHRAG_CACHE_S3_ENABLED}"
  GRAPHRAG_CACHE_S3_BUCKET: "${GRAPHRAG_CACHE_S3_BUCKET}"
  GRAPHRAG_CACHE_S3_PREFIX: "${GRAPHRAG_CACHE_S3_PREFIX}"
  GRAPHRAG_CACHE_S3_REGION: "${GRAPHRAG_CACHE_S3_REGION}"
  GRAPHRAG_CACHE_S3_ENDPOINT_URL: "${GRAPHRAG_CACHE_S3_ENDPOINT_URL}"
  GRAPHRAG_TOP_K: "${GRAPHRAG_TOP_K}"
  OPENWEBUI_HOST: "${OPENWEBUI_HOST}"
  KEYCLOAK_HOST: "${KEYCLOAK_HOST}"
  SEARXNG_HOST: "${SEARXNG_HOST}"
  SEARXNG_BASE_URL: "https://${SEARXNG_HOST}"
  OPENID_PROVIDER_URL: "https://${KEYCLOAK_HOST}/realms/openwebui/.well-known/openid-configuration"
