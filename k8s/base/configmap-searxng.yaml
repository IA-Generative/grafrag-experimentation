apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: ${NAMESPACE}
data:
  settings.yml: |
    use_default_settings:
      engines:
        keep_only:
          - duckduckgo
          - brave
          - startpage
          - qwant
          - mojeek
          - wikipedia
          - bing

    general:
      instance_name: "MirAI Search"
      enable_metrics: false

    search:
      safe_search: 1
      autocomplete: "duckduckgo"
      formats:
        - html
        - json

    server:
      limiter: true
      image_proxy: true
      public_instance: false

    ui:
      default_locale: "fr"
      query_in_title: false

    valkey:
      url: valkey://search-valkey:6379/0

    outgoing:
      request_timeout: 6.0
      max_request_timeout: 12.0
      retries: 2
      pool_connections: 150
      pool_maxsize: 30
      enable_http2: true
      proxies:
        all://:
          - ${SEARXNG_OUTBOUND_PROXY_PAR_URL}
          - ${SEARXNG_OUTBOUND_PROXY_AMS_URL}
          - ${SEARXNG_OUTBOUND_PROXY_WAW_URL}

    engines:
      - name: duckduckgo
        weight: 1.4
      - name: brave
        weight: 1.3
      - name: startpage
        weight: 1.2
      - name: qwant
        weight: 1.15
      - name: mojeek
        weight: 1.1
      - name: bing
        weight: 0.7
