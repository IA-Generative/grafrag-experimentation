apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipelines
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipelines
  template:
    metadata:
      labels:
        app: pipelines
    spec:
      containers:
        - name: pipelines
          image: ${PIPELINES_IMAGE}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: grafrag-config
            - secretRef:
                name: grafrag-secrets
          ports:
            - containerPort: 9099
              name: http
          volumeMounts:
            - name: pipelines-config
              mountPath: /app/pipelines
      volumes:
        - name: pipelines-config
          configMap:
            name: pipelines-config
