apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
        - name: openwebui
          image: ${OPENWEBUI_IMAGE}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: grafrag-config
            - secretRef:
                name: grafrag-secrets
          env:
            - name: ENABLE_SIGNUP
              value: "false"
            - name: ENABLE_OAUTH_SIGNUP
              value: "true"
            - name: OAUTH_PROVIDER_NAME
              value: "Keycloak"
            - name: OAUTH_CLIENT_ID
              value: "openwebui"
            - name: OAUTH_SCOPES
              value: "openid profile email"
            - name: OPENAI_API_BASE_URL
              value: "http://pipelines:9099/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: grafrag-secrets
                  key: PIPELINES_API_KEY
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: openwebui-data
              mountPath: /app/backend/data
      volumes:
        - name: openwebui-data
          emptyDir: {}

